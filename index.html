<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f766e" />
    <meta
      name="description"
      content="UniMesinha — controle de estoque, vendas e cardápio digital para mesinhas universitárias."
    />
    <link rel="icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>UniMesinha</title>
    <script>
      // Aplica o tema salvo antes da primeira pintura para não piscar o tema
      // errado. A lógica completa fica em src/lib/tema.ts.
      try {
        var tema = localStorage.getItem('unimesinha.tema');
        if (tema === 'claro' || tema === 'escuro') {
          document.documentElement.dataset.tema = tema;
        }
      } catch (erro) {
        /* Sem localStorage o tema segue o do dispositivo. */
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
